name: Build & Push Docker images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/thysmajs/michelin-backend
  FRONTEND_IMAGE: ghcr.io/thysmajs/michelin-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-backend:
    name: Test backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: michelin
          POSTGRES_PASSWORD: michelin
          POSTGRES_DB: michelin_velo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://michelin:michelin@localhost:5432/michelin_velo?schema=public
      NODE_ENV: test
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 100
      FRONTEND_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run unit tests
        id: unit
        continue-on-error: true
        working-directory: backend
        run: npm test -- --forceExit --json --outputFile=unit-results.json

      - name: Apply migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Seed database
        working-directory: backend
        run: npx prisma db seed

      - name: Run e2e tests
        id: e2e
        continue-on-error: true
        working-directory: backend
        run: npm run test:e2e -- --forceExit --json --outputFile=e2e-results.json

      - name: Generate test summary
        if: always()
        run: |
          cat << 'EOF' > /tmp/summary.js
          const fs = require('fs');
          function section(file, title) {
            try {
              const r = JSON.parse(fs.readFileSync(file, 'utf8'));
              const ok = r.numFailedTests === 0;
              const icon = ok ? '✅' : '❌';
              let out = `### ${icon} ${title}\n\n`;
              out += `| | |\n|---|---|\n`;
              out += `| Test Files | **${r.numPassedTestSuites} passed** · ${r.numTotalTestSuites} total |\n`;
              out += `| Tests      | **${r.numPassedTests} passed** · ${r.numTotalTests} total |\n\n`;
              if (r.numFailedTests > 0) out += `> ⚠️ ${r.numFailedTests} test(s) en échec\n\n`;
              return out;
            } catch (e) {
              return `### ⚠️ ${title} — résultats non disponibles\n\n`;
            }
          }
          const out = '## 🧪 Backend — Jest Test Report\n\n'
            + section('backend/unit-results.json', 'Tests unitaires')
            + section('backend/e2e-results.json', 'Tests e2e');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, out);
          EOF
          node /tmp/summary.js

      - name: Fail if any test failed
        if: always() && (steps.unit.outcome == 'failure' || steps.e2e.outcome == 'failure')
        run: exit 1

  test-frontend:
    name: Test frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

  backend:
    name: Build backend
    needs: test-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: Build frontend
    needs: test-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Met à jour le repo GitOps pour déclencher ArgoCD
  gitops-update:
    name: Trigger ArgoCD via GitOps repo
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ThysmaJS/k3s-gitops-lab  # ← remplace par ton repo GitOps
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update deploy SHA annotation
        run: |
          # Met à jour l'annotation deploy-sha dans les manifests du backend et du frontend.
          # Adapte les chemins selon la structure de TON repo GitOps.
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          for f in gitops/apps/michelin/backend.yaml gitops/apps/michelin/frontend.yaml; do
            [ -f "$f" ] && sed -i "s|deploy-sha:.*|deploy-sha: \"$SHORT ($DATE)\"|g" "$f" || echo "WARN: $f not found, skipping"
          done

      - name: Commit and push
        run: |
          cd gitops
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore: deploy michelin ${{ github.sha }}"
          git push
