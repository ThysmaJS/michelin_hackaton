# Infrastructure de développement Michelin Vélo — PostgreSQL + pgAdmin.
# Lancement : `docker compose up -d` depuis le dossier backend/.
# Les identifiants proviennent du fichier .env (cf. .env.example).
services:
  postgres:
    image: postgres:16-alpine
    container_name: michelin_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-michelin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-michelin}
      POSTGRES_DB: ${POSTGRES_DB:-michelin_velo}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Empêche pgAdmin / l'app de démarrer avant que la base soit prête.
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-michelin} -d ${POSTGRES_DB:-michelin_velo}']
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: michelin_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@michelin.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
